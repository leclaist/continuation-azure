name: Update Ruby and dependencies

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      branch: ${{ steps.commit.outputs.branch }}
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Audit current dependencies
        id: pre_audit
        run: |
          if bin/bundler-audit 2>&1 | tee /tmp/pre-audit.txt; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            echo "status=vulnerable" >> "$GITHUB_OUTPUT"
          fi

      - name: Find latest stable Ruby
        id: ruby
        run: |
          today=$(date +%Y-%m-%d)
          latest=$(curl -fsSL "https://endoflife.date/api/ruby.json" | \
            jq -r --arg today "$today" \
            '[.[] | select(.eol == false or .eol > $today)] |
            sort_by(.latest | split(".") | map(tonumber)) | last | .latest')
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$(cat .ruby-version)" >> "$GITHUB_OUTPUT"

      - name: Update .ruby-version
        run: echo "${{ steps.ruby.outputs.latest }}" > .ruby-version

      - name: Set up updated Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.ruby.outputs.latest }}
          bundler-cache: false

      - name: Update all gems
        run: |
          bundle config set --local frozen false
          bundle update --all
          bundle list | grep '* rails ' | awk '{print $3}' | tr -d '()' > /tmp/rails-version.txt

      - name: Audit updated dependencies
        run: bin/bundler-audit 2>&1 | tee /tmp/post-audit.txt

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        id: commit
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          branch="automated/dependencies-$(date +%Y-%m-%d)"
          git checkout -b "$branch"
          git add .ruby-version Gemfile.lock
          git commit -m "chore: update Ruby to ${{ steps.ruby.outputs.latest }} and gem dependencies"
          git push --force origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open pull request
        id: pr
        if: steps.diff.outputs.changed == 'true'
        run: |
          rails_version=$(cat /tmp/rails-version.txt)
          pre_audit=$(cat /tmp/pre-audit.txt)
          post_audit=$(cat /tmp/post-audit.txt)
          branch="${{ steps.commit.outputs.branch }}"

          existing=$(gh pr list --head "$branch" --json number --jq '.[0].number // empty')
          if [ -z "$existing" ]; then
            gh pr create \
              --title "chore: update Ruby ${{ steps.ruby.outputs.current }} → ${{ steps.ruby.outputs.latest }} and gems" \
              --body "## Automated dependency update

          | | Version |
          |---|---|
          | Ruby | ${{ steps.ruby.outputs.current }} → ${{ steps.ruby.outputs.latest }} |
          | Rails | ${rails_version} |

          ### Pre-update vulnerability audit
          \`\`\`
          ${pre_audit}
          \`\`\`

          ### Post-update vulnerability audit
          \`\`\`
          ${post_audit}
          \`\`\`

          > Gems updated with \`bundle update\` within existing Gemfile constraints."
          fi

          pr_number=$(gh pr list --head "$branch" --json number --jq '.[0].number')
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  wait-for-ci:
    name: Wait for CI
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Wait for CI checks to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          pr_number="${{ needs.update.outputs.pr_number }}"
          branch="${{ needs.update.outputs.branch }}"

          echo "Approving any workflow runs waiting on manual approval..."
          gh api "repos/${{ github.repository }}/actions/runs" \
            --jq ".workflow_runs[] | select(.head_branch == \"$branch\" and .status == \"action_required\") | .id" \
            | while read -r run_id; do
              echo "Approving run $run_id"
              gh api "repos/${{ github.repository }}/actions/runs/$run_id/approve" -X POST || true
            done

          echo "Waiting for CI checks on PR #$pr_number to start..."
          for i in $(seq 1 12); do
            gh pr checks "$pr_number" 2>/dev/null | grep -q '.' && break
            echo "No checks yet ($i/12), retrying in 10s..."
            sleep 10
          done
          echo "Checks started, watching for completion..."
          gh pr checks "$pr_number" --watch --fail-fast

  deploy-staging:
    name: Deploy to Fly staging
    needs: [update, wait-for-ci]
    runs-on: ubuntu-latest
    concurrency: deploy-staging
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.update.outputs.branch }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config fly.staging.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_STAGING_API_TOKEN }}

  verify-staging:
    name: Verify staging
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test
        run: |
          echo "Waiting for staging to wake up..."
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://continuation-staging.fly.dev || echo "000")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Staging is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "Staging failed to return 200 after 10 attempts"
          exit 1

  merge:
    name: Merge to main
    needs: [update, verify-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Merge pull request
        run: |
          gh pr merge "${{ needs.update.outputs.pr_number }}" --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
