name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    concurrency: deploy-staging
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config fly.staging.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_STAGING_API_TOKEN }}

  verify-staging:
    name: Verify staging
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test
        run: |
          echo "Waiting for staging to wake up..."
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://continuation-staging.fly.dev || echo "000")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Staging is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "Staging failed to return 200 after 10 attempts"
          exit 1

  deploy-production:
    name: Deploy to production
    needs: verify-staging
    runs-on: ubuntu-latest
    concurrency: deploy-production
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
